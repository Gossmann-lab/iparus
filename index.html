<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPARUS - Integrated Parus Platform</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 1. Load React First (Stable Versions) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- 2. Load JBrowse Linear Genome View (Specific Version to avoid MIME errors) -->
    <script src="https://unpkg.com/@jbrowse/react-linear-genome-view@3.1.0/dist/react-linear-genome-view.browser.js" crossorigin></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --bg-body: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border-light: #e2e8f0;
        }

        body.dark-mode {
            --bg-body: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
            --border-light: #334155;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            transition: all 0.3s ease;
        }

        .hero {
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            color: white; padding: 50px 20px; text-align: center;
            border-bottom: 4px solid #e74c3c; position: relative;
        }
        
        .logo-container { position: absolute; top: 0; left: 0; width: 310px; height: 310px; }
        .hero-logo { position: absolute; top: 45%; left: 35%; transform: translate(-50%, -50%); width: 360px; }

        .container { max-width: 1300px; margin: -30px auto 40px auto; padding: 0 20px; position: relative; z-index: 20; }
        .dashboard-card { background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); padding: 30px; }

        .tabs-container {
            display: flex; justify-content: center; margin-bottom: 25px; position: sticky; top: 20px; z-index: 1000; 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 50px; width: fit-content; margin: 0 auto;
        }
        body.dark-mode .tabs-container { background: rgba(30, 41, 59, 0.85); }

        .tabs { display: inline-flex; background: #f1f5f9; padding: 8px; border-radius: 50px; gap: 5px; }
        body.dark-mode .tabs { background: #334155; }

        .tab-btn { background: transparent; border: none; padding: 12px 24px; font-weight: 600; cursor: pointer; color: var(--text-muted); border-radius: 40px; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        iframe { width: 100%; height: 750px; border: none; border-radius: 12px; }

        .visualizer-controls { margin-bottom: 20px; padding: 20px; background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; gap: 15px; }
        body.dark-mode .visualizer-controls { background: #334155; }
        #sampleSelect { padding: 10px; border-radius: 8px; flex-grow: 1; background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-light); }
        
        #jbrowse-root { border: 1px solid var(--border-light); border-radius: 12px; min-height: 600px; background: white; overflow: hidden; }

        .site-footer { background-color: #0f172a; color: #cbd5e1; padding: 30px 20px; margin-top: 60px; text-align: center; }
        .theme-circle-btn { width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer; background: #1e293b; color: #fbbf24; }
    </style>
</head>
<body>

    <header class="hero">
        <div class="logo-container">
            <img src="https://github.com/Gossmann-lab/iparus/blob/main/New_logo.png?raw=true" alt="Logo" class="hero-logo">
        </div>
        <h1>IPARUS: Genomic Resources for the Parus genus</h1>
        <p>Integrated Platform for <i>Parus</i> Alignments, Resources and Useful Sequences.</p>
    </header>

    <div class="container">
        <div class="dashboard-card">
            <div class="tabs-container">
                <div class="tabs">
                    <button class="tab-btn active" onclick="openTab('mapTab')" id="btnMap">🌍 Map View</button>
                    <button class="tab-btn" onclick="openTab('visualTab')" id="btnVisual">🔬 Interactive Visualizer</button>
                    <button class="tab-btn" onclick="openTab('tableTab')" id="btnTable">🧬 Sequence Data</button>
                    <button class="tab-btn" onclick="openTab('infoTab')" id="btnInfo">📊 Info</button>
                    <button class="tab-btn" onclick="openTab('pipelineTab')" id="btnPipeline">💻 Pipeline</button>
                    <button class="tab-btn" onclick="openTab('contactTab')" id="btnContact">✉️ Contact</button>
                </div>
            </div>

            <div id="mapTab" class="tab-content active"><iframe src="Final_Styled_Map.html"></iframe></div>
            
            <div id="visualTab" class="tab-content">
                <div class="visualizer-controls">
                    <label><strong>Select Sample:</strong></label>
                    <select id="sampleSelect" onchange="updateJBrowse()">
                        <option value="">-- Choose a Sample --</option>
                    </select>
                </div>
                <div id="jbrowse-root">
                    <div style="padding: 50px; text-align: center; color: #666;">Please select a sample to load the genome view.</div>
                </div>
            </div>

            <div id="tableTab" class="tab-content"><iframe src="samples_table.html"></iframe></div>
            <div id="infoTab" class="tab-content"><iframe src="sample_information.html"></iframe></div>
            <div id="pipelineTab" class="tab-content"><div style="padding:20px;"><h3>Pipeline</h3><p>Mapping to GCF_001522545.3...</p></div></div>
            <div id="contactTab" class="tab-content"><div style="padding:20px;"><h3>Contact</h3><p>Gossmann lab, TU Dortmund University.</p></div></div>
        </div>
    </div>

    <footer class="site-footer">
        &copy; 2026 IPARUS Database.
        <button class="theme-circle-btn" onclick="toggleTheme()" style="float:right;"><span id="theme-icon">🌙</span></button>
    </footer>

    <script>
        const SCIEBO_CONFIG = {
            token: "o6CpwRbCfPN7d6c",
            pass: "rKKbnToMwe",
            baseUrl: "https://tu-dortmund.sciebo.de/public.php/dav/files/o6CpwRbCfPN7d6c/"
        };

        const GITHUB_CONFIG = { user: "Gossmann-lab", repo: "iparus" };
        const PROXY_URL = "https://round-disk-db63.mohammadmoein-hajihoseinigazestani.workers.dev/?url=";

        const bamFiles = [
            "SRR1793405_sorted_dedup.bam", "SRR1793406_sorted_dedup.bam", "SRR1793407_sorted_dedup.bam",
            "SRR1793415_sorted_dedup.bam", "SRR1793417_sorted_dedup.bam", "SRR1793419_sorted_dedup.bam",
            "SRR1793420_sorted_dedup.bam", "SRR1793421_sorted_dedup.bam", "SRR1793422_sorted_dedup.bam",
            "SRR1793423_sorted_dedup.bam", "SRR1793424_sorted_dedup.bam", "SRR1793425_sorted_dedup.bam",
            "SRR1793427_sorted_dedup.bam", "SRR1793428_sorted_dedup.bam", "SRR1793429_sorted_dedup.bam",
            "SRR1793430_sorted_dedup.bam", "SRR1793431_sorted_dedup.bam", "SRR1793432_sorted_dedup.bam",
            "SRR1793433_sorted_dedup.bam", "SRR1793434_sorted_dedup.bam", "SRR1793435_sorted_dedup.bam",
            "SRR1793436_sorted_dedup.bam", "SRR1793437_sorted_dedup.bam", "SRR1793438_sorted_dedup.bam",
            "SRR1793439_sorted_dedup.bam", "SRR1793440_sorted_dedup.bam", "SRR1793441_sorted_dedup.bam",
            "SRR1793442_sorted_dedup.bam", "SRR1793443_sorted_dedup.bam", "SRR1793444_sorted_dedup.bam",
            "SRR1793445_sorted_dedup.bam", "SRR1793447_sorted_dedup.bam", "SRR2961328_sorted_dedup.bam",
            "SRR2961671_sorted_dedup.bam", "SRR2961674_sorted_dedup.bam", "SRR2961676_sorted_dedup.bam",
            "SRR2961678_sorted_dedup.bam", "SRR2961680_sorted_dedup.bam", "SRR2961684_sorted_dedup.bam",
            "SRR2961689_sorted_dedup.bam", "SRR2961695_sorted_dedup.bam", "SRR2961697_sorted_dedup.bam",
            "SRR2961699_sorted_dedup.bam", "SRR2961701_sorted_dedup.bam", "SRR2961712_sorted_dedup.bam",
            "SRR2961716_sorted_dedup.bam", "SRR2961718_sorted_dedup.bam", "SRR2961722_sorted_dedup.bam",
            "SRR2961725_sorted_dedup.bam", "SRR2961728_sorted_dedup.bam", "SRR2961731_sorted_dedup.bam",
            "SRR2961736_sorted_dedup.bam", "SRR2961746_sorted_dedup.bam", "SRR2961750_sorted_dedup.bam",
            "SRR2961753_sorted_dedup.bam", "SRR2961756_sorted_dedup.bam", "SRR2961759_sorted_dedup.bam",
            "SRR2961762_sorted_dedup.bam", "SRR2961765_sorted_dedup.bam", "SRR2961769_sorted_dedup.bam",
            "SRR2961773_sorted_dedup.bam", "SRR2961775_sorted_dedup.bam", "SRR3085443_sorted_dedup.bam",
            "SRR5423293_sorted_dedup.bam", "SRR5423294_sorted_dedup.bam", "SRR5423295_sorted_dedup.bam",
            "SRR5423296_sorted_dedup.bam", "SRR5423297_sorted_dedup.bam", "SRR5423298_sorted_dedup.bam",
            "SRR5423299_sorted_dedup.bam", "SRR5423300_sorted_dedup.bam", "SRR5423301_sorted_dedup.bam",
            "SRR5423302_sorted_dedup.bam", "SRR765717_sorted_dedup.bam", "SRR9656355_sorted_dedup.bam",
            "SRR9656356_sorted_dedup.bam", "SRR9656357_sorted_dedup.bam", "SRR9656367_sorted_dedup.bam",
            "SRR9656368_sorted_dedup.bam", "SRR9656369_sorted_dedup.bam"
        ];

        const select = document.getElementById('sampleSelect');
        bamFiles.forEach(file => {
            let opt = document.createElement('option');
            opt.value = file;
            opt.innerHTML = file.split('_')[0];
            select.appendChild(opt);
        });

        let reactRoot = null;

        function updateJBrowse() {
            const fileName = select.value;
            if (!fileName) return;

            // Check if library is loaded
            if (typeof JBrowseReactLinearGenomeView === 'undefined') {
                console.error("JBrowse Library not found!");
                return;
            }

            const { createViewState, JBrowseLinearGenomeView } = JBrowseReactLinearGenomeView;
            const sampleFolder = fileName.split('_')[0];
            const authHeader = "Basic " + btoa(SCIEBO_CONFIG.token + ":" + SCIEBO_CONFIG.pass);
            
            const bamUrl = PROXY_URL + encodeURIComponent(`${SCIEBO_CONFIG.baseUrl}${sampleFolder}/${fileName}`);
            const fastaUrl = PROXY_URL + encodeURIComponent(`${SCIEBO_CONFIG.baseUrl}GCF_001522545.3/GCF_001522545.3_Parus_major1.1_genomic.fna`);
            const baiUrl = `https://raw.githubusercontent.com/${GITHUB_CONFIG.user}/${GITHUB_CONFIG.repo}/main/Bai/${fileName}.bai`;
            const faiUrl = `https://raw.githubusercontent.com/${GITHUB_CONFIG.user}/${GITHUB_CONFIG.repo}/main/GCF_001522545.3_Parus_major1.1_genomic.fna.fai`;

            const state = createViewState({
                assembly: {
                    name: 'ParusMajor',
                    sequence: {
                        type: 'ReferenceSequenceTrack',
                        trackId: 'ref-track',
                        adapter: {
                            type: 'IndexedFastaAdapter',
                            fastaLocation: { uri: fastaUrl, locationType: 'UriLocation' },
                            faiLocation: { uri: faiUrl, locationType: 'UriLocation' },
                        },
                    },
                },
                tracks: [
                    {
                        type: 'AlignmentsTrack',
                        trackId: 'align-' + fileName,
                        name: 'Sample: ' + fileName,
                        assemblyNames: ['ParusMajor'],
                        adapter: {
                            type: 'BamAdapter',
                            bamLocation: { uri: bamUrl, locationType: 'UriLocation' },
                            index: { location: { uri: baiUrl, locationType: 'UriLocation' } },
                        },
                    },
                ],
                location: 'NC_031768.1:222000..225000',
                makeRequest: (url, opts) => {
                    const headers = opts.headers || {};
                    if (url.includes('sciebo.de') || url.includes('workers.dev')) {
                        headers['Authorization'] = authHeader;
                    }
                    return fetch(url, { ...opts, headers });
                }
            });

            const container = document.getElementById('jbrowse-root');
            if (!reactRoot) reactRoot = ReactDOM.createRoot(container);
            reactRoot.render(React.createElement(JBrowseLinearGenomeView, { viewState: state }));
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            const btnId = 'btn' + tabId.replace('Tab','').charAt(0).toUpperCase() + tabId.replace('Tab','').slice(1);
            if(document.getElementById(btnId)) document.getElementById(btnId).classList.add('active');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.getElementById('theme-icon').innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }
    </script>
</body>
</html>
