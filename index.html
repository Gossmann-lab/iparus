<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPARUS - Integrated Parus Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/igv@2.15.5/dist/igv.min.js"></script>

<style>

:root{
--primary:#2563eb;
--bg-body:#f8fafc;
--text-main:#0f172a;
--card-bg:#ffffff;
--border-light:#e2e8f0;
}

body.dark-mode{
--bg-body:#0f172a;
--text-main:#f1f5f9;
--card-bg:#1e293b;
--border-light:#334155;
}

body{
font-family:'Inter',sans-serif;
margin:0;
background:var(--bg-body);
color:var(--text-main);
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

.dashboard-card{
background:var(--card-bg);
border-radius:20px;
padding:30px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab-btn{
padding:10px 18px;
border:none;
border-radius:30px;
cursor:pointer;
}

.tab-btn.active{
background:#2563eb;
color:white;
}

.tab-content{display:none;}
.tab-content.active{display:block;}

#igv-div{
min-height:600px;
border:1px solid var(--border-light);
border-radius:12px;
background:white;
}

.visualizer-controls{
margin-bottom:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="dashboard-card">

<div class="tabs">
<button class="tab-btn active" id="btnMap" onclick="openTab('mapTab')">🌍 Map</button>
<button class="tab-btn" id="btnVisual" onclick="openTab('visualTab')">🔬 Visualizer</button>
</div>

<div id="mapTab" class="tab-content active">
<h3>Map Placeholder</h3>
</div>

<div id="visualTab" class="tab-content">

<h3>Interactive Genome Browser</h3>

<div class="visualizer-controls">
<select id="sampleSelect">
<option value="">-- Choose Sample --</option>
</select>
</div>

<div id="igv-div"></div>

</div>

</div>
</div>

<script>

/* ===============================
CONFIG
=============================== */

const SCIEBO_CONFIG={
token:"o6CpwRbCfPN7d6c",
pass:"rKKbnToMwe",
baseUrl:"https://tu-dortmund.sciebo.de/public.php/dav/files/o6CpwRbCfPN7d6c/"
};

const GITHUB_CONFIG={
user:"Gossmann-lab",
repo:"iparus"
};

const bamFiles=[
"SRR1793405_sorted_dedup.bam",
"SRR1793406_sorted_dedup.bam",
"SRR1793407_sorted_dedup.bam"
];


/* ===============================
GLOBAL STATE
=============================== */

let igvBrowser=null;
let genomeLoaded=false;


/* ===============================
POPULATE SELECT
=============================== */

const select=document.getElementById("sampleSelect");

bamFiles.forEach(file=>{
let opt=document.createElement("option");
opt.value=file;
opt.textContent=file.split("_")[0];
select.appendChild(opt);
});

select.addEventListener("change",updateIGV);


/* ===============================
TAB SYSTEM
=============================== */

function openTab(tabId){

document.querySelectorAll(".tab-content")
.forEach(t=>t.classList.remove("active"));

document.querySelectorAll(".tab-btn")
.forEach(b=>b.classList.remove("active"));

document.getElementById(tabId).classList.add("active");

document.getElementById(
"btn"+tabId.replace("Tab","")
.charAt(0).toUpperCase()+
tabId.replace("Tab","").slice(1)
).classList.add("active");

/* ⭐ FIX IGV resize after tab visible */
setTimeout(()=>{
if(igvBrowser) igvBrowser.resize();
},200);

}


/* ===============================
IGV INITIALIZATION
=============================== */

async function updateIGV(){

const fileName=select.value;
if(!fileName) return;

const container=document.getElementById("igv-div");

container.innerHTML="⌛ Loading IGV...";

/* dispose previous browser */
if(igvBrowser){
await igvBrowser.dispose();
igvBrowser=null;
}

/* build URLs */

const sampleFolder=fileName.split("_")[0];

const bamUrl=
`${SCIEBO_CONFIG.baseUrl}${sampleFolder}/${fileName}`;

const fastaUrl=
`${SCIEBO_CONFIG.baseUrl}GCF_001522545.3/GCF_001522545.3_Parus_major1.1_genomic.fna`;

const baiUrl=
`https://raw.githubusercontent.com/${GITHUB_CONFIG.user}/${GITHUB_CONFIG.repo}/main/Bai/${fileName}.bai`;

const faiUrl=
`https://raw.githubusercontent.com/${GITHUB_CONFIG.user}/${GITHUB_CONFIG.repo}/main/GCF_001522545.3_Parus_major1.1_genomic.fna.fai`;

const authHeader=
"Basic "+btoa(SCIEBO_CONFIG.token+":"+SCIEBO_CONFIG.pass);


/* IGV OPTIONS */

const options={

genome:{
id:"ParusMajor",
fastaURL:fastaUrl,
indexURL:faiUrl,
fetchConfig:{
headers:{Authorization:authHeader}
}
},

locus:"chr1",

tracks:[{
name:fileName,
url:bamUrl,
indexURL:baiUrl,
format:"bam",
fetchConfig:{
headers:{Authorization:authHeader}
}
}]
};


/* create browser */

try{

igvBrowser=
await igv.createBrowser(container,options);

/* resize after render */
setTimeout(()=>igvBrowser.resize(),300);

}catch(err){

console.error(err);
container.innerHTML=
`<div style="color:red;padding:20px;">
IGV Error: ${err.message}
</div>`;

}

}

</script>

</body>
</html>
